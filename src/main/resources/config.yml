# ClassSystem Configuration
# Each class defines a display name, lore, starter item, LP group, and skill tree.

# ---- World Restriction ----
# List every world name where ClassSystem commands and GUIs are active.
# Leave the list empty to allow all worlds.
valid-worlds:
  - world
  - world_nether
  - world_the_end

